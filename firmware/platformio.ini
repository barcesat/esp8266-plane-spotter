; PlatformIO project for the ESP8266 Plane Spotter.
; Build:  pio run
; Upload: pio run -t upload
; Monitor: pio device monitor

[platformio]
; The sketch lives in plane_spotter/. Point the build at it.
src_dir = plane_spotter

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    olikraus/U8g2 @ ^2.35.9
    bblanchon/ArduinoJson @ ^7.0.4
